<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Call Logs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f4f6f9; }
    .navbar { background: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    .navbar h1 { font-size: 20px; }
    .navbar a { color: white; text-decoration: none; font-size: 14px; }
    .container { padding: 30px; }
    .section { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .section h3 { margin-bottom: 15px; color: #2c3e50; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
    th { background: #f8f9fa; color: #666; }
    .transcript { max-width: 500px; white-space: pre-wrap; font-size: 12px; color: #555; line-height: 1.6; }
  </style>
</head>
<body>

<div class="navbar">
  <h1>📋 Call Logs</h1>
  <a href="/">← Dashboard par wapas jao</a>
</div>

<div class="container">
  <div class="section">
    <h3>📞 Saari Conversations</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Lead ID</th>
          <th>Conversation</th>
          <th>Date & Time</th>
          <th>Recording</th>
        </tr>
      </thead>
      <tbody id="logs-table">
        <tr><td colspan="4" style="text-align:center;color:#888">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  async function loadLogs() {
    const res = await fetch('/call-logs');
    const logs = await res.json();

    const tbody = document.getElementById('logs-table');

    if (logs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#888">Koi logs nahi hain</td></tr>';
      return;
    }

    tbody.innerHTML = logs.map(log => `
      <tr>
        <td>${log.id}</td>
        <td>${log.lead_id}</td>
        <td class="transcript">${log.transcript || '-'}</td>
        <td>${new Date(log.created_at).toLocaleString('en-IN')}</td>
        <td>${log.recording_url ? `<a href="${log.recording_url}" target="_blank">🎵 Listen</a>` : '-'}</td>
      </tr>
    `).join('');
  }

  loadLogs();
</script>

</body>
</html>
